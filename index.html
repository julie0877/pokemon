<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <main class="conteudo">
        <header>
            <h1 class="poppins-bold">Escolha seu Pokemon</h1>
        </header>
        <!--seção com os cards pokemon-->
        <section class="cards-lista">
            <article class="card planta">
                <figure class="avatar-container">
                    <div class="aro-avatar"></div>
                    <img src="img/bulbasauro.png" alt="Bulbasauro imagem 3D">
                </figure>
                <h2 class="nome-pokemon poppins-bold">Bulbasauro</h2>
                <p class="tipo-pokemon">Planta</p>
                <dl class="lista-estatisticas">
                    <!--item de estatistica-->
                    <dt class="nome-estatistica">Força</dt>
                    <!--dd = descrition term = detalhe da descrição-->
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 60%;"></div>
                    </dd>
                    <!--fim item de estatistica-->
                       <!--item de estatistica-->
                       <dt class="nome-estatistica">Velocidade</dt>
                       <!--dd = descrition term = detalhe da descrição-->
                       <dd class="barra-estatistica">
                           <div class="barra-preenchimento" style="width: 70%;"></div>
                       </dd>
                       <!--fim item de estatistica-->  
                        <!--item de estatistica-->
                    <dt class="nome-estatistica">Peso</dt>
                    <!--dd = descrition term = detalhe da descrição-->
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 45%;"></div>
                    </dd>
                    <!--fim item de estatistica-->   
                    <!--item de estatistica-->
                    <dt class="nome-estatistica">Habilidade</dt>
                    <!--dd = descrition term = detalhe da descrição-->
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 75%;"></div>
                    </dd>
                    <!--fim item de estatistica-->
                </dl>
            </article>

            <article class="card agua">
                <figure class="avatar-container">
                    <div class="aro-avatar"></div>
                    <img src="img/squirlte.png" alt="squirlte imagem 3D">
                </figure>
                <h2 class="nome-pokemon poppins-bold">Squirlte</h2>
                <p class="tipo-pokemon">agua</p>
                <dl class="lista-estatisticas">
                    <!--item de estatistica-->
                    <dt class="nome-estatistica">Agua</dt>
                    <!--dd = descrition term = detalhe da descrição-->
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 60%;"></div>
                    </dd>
                    <!--fim item de estatistica-->
                       <!--item de estatistica-->
                       <dt class="nome-estatistica">Velocidade</dt>
                       <!--dd = descrition term = detalhe da descrição-->
                       <dd class="barra-estatistica">
                           <div class="barra-preenchimento" style="width: 60%;"></div>
                       </dd>
                       <!--fim item de estatistica-->  
                        <!--item de estatistica-->
                    <dt class="nome-estatistica">Peso</dt>
                    <!--dd = descrition term = detalhe da descrição-->
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 45%;"></div>
                    </dd>
                    <!--fim item de estatistica-->   
                    <!--item de estatistica-->
                    <dt class="nome-estatistica">Habilidade</dt>
                    <!--dd = descrition term = detalhe da descrição-->
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 75%;"></div>
                    </dd>
                    <!--fim item de estatistica-->
                </dl>
            </article>

            <article class="card fogo">
                <figure class="avatar-container">
                    <div class="aro-avatar"></div>
                    <img src="img/charmander.png" alt="charmander imagem 3D">
                </figure>
                <h2 class="nome-pokemon poppins-bold">Charmander</h2>
                <p class="tipo-pokemon">Fogo</p>
                <dl class="lista-estatisticas">
                    <!--item de estatistica-->
                    <dt class="nome-estatistica">Força</dt>
                    <!--dd = descrition term = detalhe da descrição-->
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 80%;"></div>
                    </dd>
                    <!--fim item de estatistica-->
                       <!--item de estatistica-->
                       <dt class="nome-estatistica">Velocidade</dt>
                       <!--dd = descrition term = detalhe da descrição-->
                       <dd class="barra-estatistica">
                           <div class="barra-preenchimento" style="width: 20%;"></div>
                       </dd>
                       <!--fim item de estatistica-->  
                        <!--item de estatistica-->
                    <dt class="nome-estatistica">Peso</dt>
                    <!--dd = descrition term = detalhe da descrição-->
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 45%;"></div>
                    </dd>
                    <!--fim item de estatistica-->   
                    <!--item de estatistica-->
                    <dt class="nome-estatistica">Habilidade</dt>
                    <!--dd = descrition term = detalhe da descrição-->
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 75%;"></div>
                    </dd>
                    <!--fim item de estatistica-->
                </dl>
            </article>

            <article class="card eletrico">
                <figure class="avatar-container">
                    <div class="aro-avatar"></div>
                    <img src="img/pikachu.png" alt="pikachu imagem 3D">
                </figure>
                <h2 class="nome-pokemon poppins-bold">Pikachu</h2>
                <p class="tipo-pokemon">eletrico</p>
                <dl class="lista-estatisticas">
                    <!--item de estatistica-->
                    <dt class="nome-estatistica">Força</dt>
                    <!--dd = descrition term = detalhe da descrição-->
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 60%;"></div>
                    </dd>
                    <!--fim item de estatistica-->
                       <!--item de estatistica-->
                       <dt class="nome-estatistica">Velocidade</dt>
                       <!--dd = descrition term = detalhe da descrição-->
                       <dd class="barra-estatistica">
                           <div class="barra-preenchimento" style="width: 70%;"></div>
                       </dd>
                       <!--fim item de estatistica-->  
                        <!--item de estatistica-->
                    <dt class="nome-estatistica">Peso</dt>
                    <!--dd = descrition term = detalhe da descrição-->
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 35%;"></div>
                    </dd>
                    <!--fim item de estatistica-->   
                    <!--item de estatistica-->
                    <dt class="nome-estatistica">Habilidade</dt>
                    <!--dd = descrition term = detalhe da descrição-->
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 65%;"></div>
                    </dd>
                    <!--fim item de estatistica-->
                </dl>
            </article>
        </section>

    </main>

</body>

</html>
